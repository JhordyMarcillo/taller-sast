version: '3.8'

services:
  sonarqube:
    image: sonarqube:9.9-community   # Versión LTS recomendada de la serie 9
    # image: sonarqube:9-community    # O la última de la serie 9 si prefieres
    
    container_name: sonarqube
    restart: unless-stopped
    
    ports:
      - "9000:9000"   # Accede en http://localhost:9000
    
    environment:
      - SONAR_EDITION=community
      
      # Opcional: aumentar memoria (recomendado)
      - SONARQUBE_WEB_JVM_OPTS=-Xmx512m -Xms128m
      
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: